<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Deployment</title>
    <meta name="description" content="Static entry page for deployment." />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(140deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 32px;
        width: min(560px, 92vw);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        display: block;
      }
      h1 {
        font-size: 28px;
        margin: 8px 0 12px;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.6;
        color: #334155;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid #0f172a;
        color: #0f172a;
        text-decoration: none;
        font-weight: 600;
      }
      .btn.primary {
        background: #0f172a;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/logo.svg" alt="Project logo" />
      <h1>Project deployed</h1>
      <p>
        This is a static HTML entry page. If you are deploying the Next.js app,
        run the app server or export a static build and serve the output.
      </p>
      <div class="actions">
        <a class="btn primary" href="/">Open app</a>
        <a class="btn" href="/index.html">Static page</a>
      </div>
    </main>
  </body>
</html>
